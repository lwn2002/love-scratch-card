<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💕 专属刮刮乐 · 只为你</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #fbc2c2 0%, #f8afaf 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 16px;
            margin: 0;
            touch-action: manipulation;
        }

        .card {
            max-width: 780px;
            width: 100%;
            background: rgba(255, 240, 240, 0.75);
            backdrop-filter: blur(6px);
            border-radius: 48px 48px 36px 36px;
            box-shadow: 0 30px 40px rgba(199, 67, 67, 0.25), 0 8px 20px rgba(180, 40, 40, 0.3);
            padding: 28px 20px 38px 20px;
            border: 2px solid #ffd7d7;
            transition: all 0.2s;
        }

        .title {
            text-align: center;
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: 6px;
            color: #b34141;
            text-shadow: 3px 3px 0 #ffe0e0;
            margin-top: -8px;
            margin-bottom: 8px;
            word-break: keep-all;
        }

        .sub {
            text-align: center;
            font-size: 1.1rem;
            color: #a14b4b;
            background: #ffefef;
            padding: 10px 18px;
            border-radius: 100px;
            margin: 0 16px 22px 16px;
            font-weight: 500;
            box-shadow: inset 0 1px 4px #ffbaba;
            border: 1px solid #fcc;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .main-row {
            display: flex;
            gap: 16px;
            align-items: stretch;
        }

        .scratch-container {
            position: relative;
            flex: 1.1;
            aspect-ratio: 1 / 1;
            border-radius: 42px;
            overflow: hidden;
            box-shadow: 0 15px 0 #ac4c4c, 0 20px 25px rgba(0,0,0,0.25);
            border: 3px solid #ffe9e9;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="8" cy="8" r="8" fill="none" stroke="%23ff5577" stroke-width="2"/><circle cx="16" cy="16" r="14" fill="%23ff99aa" opacity="0.6" /><path d="M6 6 L14 14 M14 6 L6 14" stroke="%23b32d4d" stroke-width="3"/></svg>') 16 16, cell;
            touch-action: none;  /* 禁止触摸滚动 */
        }

        .scratch-wrap {
            flex: 1.1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
        }
        .version-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-shrink: 0;
        }
        .version-btn {
            padding: 8px 20px;
            border-radius: 999px;
            border: 2px solid #ffb6c0;
            background: #fff5f6;
            color: #8b3a3f;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .version-btn:hover { background: #ffebee; }
        .version-btn.active {
            background: #ff9aa8;
            border-color: #e86a7a;
            color: #fff;
        }

        .scratch-container.flash-effect {
            animation: flashGlow 0.5s ease-out;
        }

        @keyframes flashGlow {
            0% {
                box-shadow: 0 15px 0 #ac4c4c, 0 20px 25px rgba(0,0,0,0.25);
                transform: scale(1);
            }
            40% {
                box-shadow: 0 0 30px rgba(255, 255, 255, 0.9), 0 25px 35px rgba(0,0,0,0.35);
                transform: scale(1.03);
            }
            100% {
                box-shadow: 0 15px 0 #ac4c4c, 0 20px 25px rgba(0,0,0,0.25);
                transform: scale(1);
            }
        }

        .record-panel {
            flex: 0.9;
            background: #ffeef0;
            border-radius: 30px;
            border: 2px solid #ffc7cf;
            box-shadow: inset 0 2px 6px rgba(255, 190, 200, 0.8);
            padding: 14px 12px;
            display: none; /* 有记录后再显示 */
            min-width: 0;
            align-self: stretch;
            min-height: 0;
            flex-direction: column;
        }

        .record-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 8px;
        }

        .record-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #b1444f;
            text-align: left;
        }

        .record-toggle {
            display: none;
            background: #ffd2d5;
            border: 1px solid #ff9aa8;
            border-radius: 999px;
            padding: 2px 10px;
            font-size: 0.8rem;
            color: #8b3a3f;
            cursor: pointer;
            flex-shrink: 0;
        }

        .record-panel.has-many .record-toggle {
            display: block;
        }

        .record-list {
            max-height: 100%;
            overflow-y: auto;
            padding-right: 4px;
            transition: max-height 0.25s ease;
        }

        .record-list.collapsed {
            max-height: 200px;
            overflow-y: hidden;
        }

        .record-item {
            font-size: 0.9rem;
            color: #8b3a3f;
            background: #fff8f8;
            border-radius: 18px;
            padding: 6px 10px;
            margin-bottom: 6px;
            border: 1px solid #ffd2d5;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            word-break: break-all;
        }

        .record-item-content {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 0;
        }

        .record-time {
            font-size: 0.72rem;
            color: #a07070;
            width: 100%;
            margin-top: 2px;
            padding-left: 0;
        }

        .record-index {
            background: #ff9aa8;
            color: #fff;
            border-radius: 999px;
            padding: 1px 8px;
            font-size: 0.78rem;
            font-weight: 700;
        }


        @media (max-width: 720px) {
            body {
                align-items: flex-start;
                padding: 10px;
            }

            .card {
                border-radius: 28px;
                padding: 18px 12px 24px 12px;
                box-shadow: 0 14px 24px rgba(199, 67, 67, 0.28);
            }

            .title {
                font-size: 1.6rem;
                letter-spacing: 3px;
                margin-top: 0;

            }

            .sub {
                font-size: 0.95rem;
                padding: 8px 12px;
                margin: 0 8px 14px 8px;
                border-radius: 999px;
            }

            .main-row {
                flex-direction: column;
                gap: 12px;
            }

            .scratch-wrap { max-width: 100%; }
            .scratch-container {
                max-width: 100%;
                box-shadow: 0 10px 0 #ac4c4c, 0 14px 18px rgba(0,0,0,0.25);

            .version-tabs { gap: 8px; }
            .version-btn { padding: 6px 14px; font-size: 0.88rem; }

            .record-panel {

            }

            .record-list.collapsed {

            }

            .record-title {
                font-size: 0.98rem;
            }

            .record-item {
                font-size: 0.8rem;
                padding: 5px 8px;
            }

            .record-time {
                font-size: 0.68rem;
            }

            .copyright {
                font-size: 0.72rem;
                margin-top: 18px;
            }

            .progress-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;

                padding: 8px 10px;
            }

            .progress-text {

            .hint {

                padding: 10px 18px;

            .footer {
                font-size: 0.85rem;

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none; /* 下层canvas不接收事件，由上层canvas统一处理 */
        }

        #scratchCanvas {
            pointer-events: auto;  /* 只有银色的刮层可以交互 */
            z-index: 10;
        }

        #prizeCanvas {
            z-index: 5;
            background: #fee3e3;  /* 暖色底 */
        }

        .copyright {
            font-size: 0.8rem;
            color: #8b5a5a;
            text-align: center;
            margin-top: 22px;
        }

        /* 刮开百分比指示器 */
        .progress-bar {
            margin-top: 22px;

            align-items: center;
            justify-content: space-between;
            background: #ffe3e3;
            border-radius: 60px;
            padding: 6px 6px 6px 18px;

        .progress-fill {
            height: 100%;

        .progress-text {
            font-weight: 700;
            color: #952525;
            font-size: 1.2rem;
            background: white;
            padding: 6px 16px;
            border-radius: 40px;
            border: 2px solid #ff9393;
            min-width: 75px;
            text-align: center;
            box-shadow: 0 2px 0 #c66;
        }

        .hint {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 18px 8px 8px 8px;
            color: #833a3a;
            font-weight: 500;
            gap: 10px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .reset-btn {
            background: #ffc9c9;
            border: none;
            border-radius: 40px;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #811e1e;
            border: 2px solid #ff8686;
            box-shadow: 0 5px 0 #b14b4b;
            transition: 0.05s linear;
            cursor: pointer;
            touch-action: manipulation;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .clear-btn {
            background: #ffe7e7;
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #904349;
            border: 2px solid #ffb6c0;
            box-shadow: 0 3px 0 #c27a83;
            transition: 0.05s linear;
            cursor: pointer;
            touch-action: manipulation;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .clear-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #c27a83;
        }

        .reset-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #b14b4b;
        }

        .footer {
            font-size: 0.95rem;
            color: #b25d5d;
            text-align: center;
            margin-top: 16px;
            font-style: italic;
            background: #fff0f0b0;
            padding: 8px;
            border-radius: 60px;
        }

        .toast-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1001;
            justify-content: center;
            align-items: center;
            padding: 20px;

        .toast-overlay.show { display: flex; }
        .toast-box {
            position: relative;
            background: #ffeef0;
            border: 2px solid #ffc7cf;
            border-radius: 30px;
            padding: 12px 20px;
            box-shadow: inset 0 2px 6px rgba(255, 190, 200, 0.8);
            font-size: 0.9rem;
            color: #8b3a3f;
            font-weight: 500;
            max-width: 320px;
            text-align: center;

        .toast-msg {
            display: block;
            text-align: center;
        }
        .toast-close {
            position: absolute;
            top: -18px;
            right: -10px;
            color: #8b3a3f;
            font-size: 1.65rem;
            font-weight: 600;
            line-height: 1;
            cursor: pointer;
        }
        .toast-close:hover { opacity: 0.8; }

        .region-block-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 998;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .region-block-overlay.show { display: flex; }
        .region-block-box {
            background: #ffeef0;
            border: 2px solid #ffc7cf;
            border-radius: 24px;
            padding: 28px 32px;
            text-align: center;
            max-width: 360px;
            font-size: 1rem;
            color: #8b3a3f;
        }
        .region-block-box strong { display: block; margin-bottom: 10px; font-size: 1.1rem; }

        .password-gate-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);

            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .password-gate-box {
            background: #ffeef0;
            border: 2px solid #ffc7cf;
            border-radius: 30px;
            padding: 28px 32px;
            box-shadow: inset 0 2px 6px rgba(255, 190, 200, 0.8);
            max-width: 320px;
            width: 100%;
        }
        .password-gate-title {
            font-size: 1.05rem;
            font-weight: 700;

        }
        .password-gate-input {
            display: block;

            box-sizing: border-box;
            padding: 12px 16px;
            font-size: 1.2rem;
            letter-spacing: 8px;

            border: 2px solid #ffb6c0;
            border-radius: 18px;
            background: #fff8f8;
            color: #8b3a3f;
            margin-bottom: 16px;
        }
        .password-gate-input::placeholder { color: #c99; }
        .password-gate-input:focus {
            outline: none;
            border-color: #ff9aa8;
            box-shadow: 0 0 0 3px rgba(255, 154, 168, 0.3);
        }
    </style>
</head>

<div class="card">
    <div class="title">💝 刮刮乐 💝</div>
    <div class="sub"><span>✨ 手指 / 鼠标 刮开 ✨</span></div>

    <div class="main-row">
        <div class="scratch-wrap">
            <div class="version-tabs">
                <button type="button" class="version-btn active" id="versionReward" data-version="reward">奖励版</button>
                <button type="button" class="version-btn" id="versionPunishment" data-version="punishment">惩罚版</button>
            </div>

                <canvas id="prizeCanvas" width="500" height="500"></canvas>

        </div>

<script>
    (function(){
        // --- 密码门：进入前隐藏主卡片 ---
        var cardEl = document.querySelector('.card');
        if (cardEl) cardEl.style.display = 'none';

        // --- 获取画布 ---
        const scratchCanvas = document.getElementById('scratchCanvas');
        const prizeCanvas = document.getElementById('prizeCanvas');
        const ctxScratch = scratchCanvas.getContext('2d', { willReadFrequently: true });
        const ctxPrize = prizeCanvas.getContext('2d');

        // 奖项列表（可继续自行增加）
        const prizesReward = ['奖励5元', '奖励1元', '奖励今日不用学习', '奖励一杯奶茶', 
         '奖励10元', '奖励按摩券15分钟', '奖励睡前故事券一张', '奖励一只口红', '奖励一个眼影',
         '奖励一个腮红','奖励一个小蛋糕','奖励买一次零食','奖励一个小玩具','奖励一本书','奖励一个项链',
         '奖励外卖免单一次', '奖励一个手链','奖励一个戒指','奖励一个发夹','奖励一个卷发棒','奖励一瓶洗发水',
         '奖励买护肤品一次'
        ];
        const prizesPunishment = ['惩罚拍摸摸视频', '惩罚拍内裤照片', '惩罚拍内衣照片','惩罚学习3小时',
         '惩罚学习2小时', '惩罚拍大长腿照片一张','惩罚拍摸摸视频','惩罚拍内裤照片','惩罚拍内衣照片',
        '惩罚一天不喝奶茶','惩罚一周不吃蛋糕','惩罚吃学校食堂快餐一次','惩罚拍内裤视频一次','惩罚今日学习4小时',
        '惩罚给哥哥买零食一次','惩罚三天不能吃零食','惩罚给哥哥点一次外卖','惩罚后面两次视频均为60s以上','惩罚瑟瑟照片两张',
        '惩罚今天不能熬夜','惩罚今天必须学习（不限时间）','惩罚拍打屁股视频'
        ];
        let currentVersion = 'reward';
        function getCurrentPrizes() { return currentVersion === 'reward' ? prizesReward : prizesPunishment; }
        let currentPrizeIndex = 0;
        function pickNewPrize() {
            const list = getCurrentPrizes();
            currentPrizeIndex = list.length > 0 ? Math.floor(Math.random() * list.length) : 0;
        }
        pickNewPrize();
        // 历史记录
        const recordPanel = document.getElementById('recordPanel');
        const recordList = document.getElementById('recordList');
        let recordCount = 0;

        // 自动揭开的阈值与状态（手机端 70%，电脑端 50%）
        function getAutoRevealThreshold() {
            return (window.innerWidth || document.documentElement.clientWidth || 0) <= 720 ? 70 : 50;
        }
        let hasAutoRevealed = false;

        // 奖项文字缩放动画状态
        let prizeScale = 1;
        let prizeScaleAnimating = false;
        let prizeScaleStartTime = 0;
        const PRIZE_SCALE_DURATION = 260; // 毫秒
        let prizeScaleFrameId = null;

        function formatRecordTime() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const h = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            const s = String(d.getSeconds()).padStart(2, '0');
            return y + '-' + m + '-' + day + ' ' + h + ':' + min + ':' + s;
        }

        // 定位信息缓存（省市，中文），使用高德地图 IP 定位
        var AMAP_KEY = '8a2ee93c1d72ae248af043fddf681f70';
        let cachedLocation = '';
        let cachedProvince = '';
        let cachedCity = '';
        let locationPromise = null;
        var ALLOWED_REGIONS = [
            ['内蒙古', '呼和浩特'],
            ['河南', '周口'],
            ['海南', '儋州'],
            ['海南', '海口'],
            ['辽宁', '大连']
        ];
        function isAllowedRegion(province, city) {
            if (!province && !city) return true;
            var p = (province || '').trim();
            var c = (city || '').trim();
            return ALLOWED_REGIONS.some(function(pair) {
                return p.indexOf(pair[0]) !== -1 && c.indexOf(pair[1]) !== -1;
            });
        }
        function applyRegionCheck() {

        function setLocationFromIpapiCo(res) {

        function tryAmapIpViaProxy() {
            if (!AMAP_KEY || AMAP_KEY === 'YOUR_AMAP_KEY') return Promise.resolve(false);
            var url = 'https://restapi.amap.com/v3/ip?key=' + encodeURIComponent(AMAP_KEY);
            var proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
            return fetch(proxy).then(function(r) { return r.text(); }).then(function(text) {

        function tryBrowserGeoAndRegeo() {
            if (!navigator.geolocation || !AMAP_KEY || AMAP_KEY === 'YOUR_AMAP_KEY') return Promise.resolve(false);
            return new Promise(function(resolve) {
                var resolved = false;
                var t = setTimeout(function() {
                    if (!resolved) { resolved = true; resolve(false); }
                }, 6000);
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        if (resolved) return;
                        var lng = pos.coords.longitude;
                        var lat = pos.coords.latitude;
                        var url = 'https://restapi.amap.com/v3/geocode/regeo?key=' + encodeURIComponent(AMAP_KEY) + '&location=' + lng + ',' + lat;
                        function doRegeo(regeoUrl) {
                            fetch(regeoUrl).then(function(r) { return r.json(); }).then(function(res) {
                                resolved = true;
                                clearTimeout(t);
                                resolve(setLocationFromAmapRegeo(res));
                            }).catch(function() {
                                var proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
                                fetch(proxy).then(function(r) { return r.text(); }).then(function(text) {
                                    try { var res = JSON.parse(text); resolved = true; clearTimeout(t); resolve(setLocationFromAmapRegeo(res)); } catch (e) { resolved = true; clearTimeout(t); resolve(false); }
                                }).catch(function() { resolved = true; clearTimeout(t); resolve(false); });
                            });
                        }
                        doRegeo(url);
                    },
                    function() { if (!resolved) { resolved = true; clearTimeout(t); resolve(false); } },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            });
        }
        function setLocationFromIpApi(data) {
            if (!data || !data.regionName) return false;

        function tryJsonpIpApi() {
            return new Promise(function(resolve) {
                var resolved = false;
                var t = setTimeout(function() {
                    if (resolved) return;
                    resolved = true;
                    if (window.__ipApiCb) window.__ipApiCb = null;
                    resolve(false);
                }, 4000);
                window.__ipApiCb = function(data) {
                    if (resolved) return;
                    resolved = true;
                    clearTimeout(t);
                    window.__ipApiCb = null;
                    resolve(setLocationFromIpApi(data));
                };
                var script = document.createElement('script');
                script.src = 'http://ip-api.com/json/?lang=zh-CN&callback=__ipApiCb';
                script.onerror = function() {

        function tryCorsProxyIpApi() {
            var url = 'http://ip-api.com/json/?lang=zh-CN';
            var proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
            return fetch(proxy).then(function(r) { return r.json(); }).then(function(data) { return setLocationFromIpApi(data); }).catch(function() { return false; });
        }
        function fetchLocation(onDone) {
            if (locationPromise) return locationPromise;
            locationPromise = new Promise(function(resolve) {
                var done = function() { if (onDone) onDone(); resolve(); };
                function tryAmap() {
                    if (!AMAP_KEY || AMAP_KEY === 'YOUR_AMAP_KEY') return Promise.resolve(false);
                    return fetch('https://restapi.amap.com/v3/ip?key=' + encodeURIComponent(AMAP_KEY))
                        .then(function(r) { return r.json(); })
                        .then(function(res) { return setLocationFromAmap(res); })
                        .catch(function() { return false; });
                }
                function tryIpapiCo() {
                    return fetch('https://ipapi.co/json/')
                        .then(function(r) { return r.json(); })
                        .then(function(res) { return setLocationFromIpapiCo(res); })
                        .catch(function() { return false; });
                }
                function tryZhengbingdong() {
                    return fetch('https://ip.zhengbingdong.com/v1/get')
                        .then(function(r) { return r.json(); })
                        .then(function(res) { return setLocationFromZhengbingdong(res); })
                        .catch(function() { return false; });
                }
                tryAmapIpViaProxy().then(function(ok) {
                    if (ok) { done(); return; }
                    return tryBrowserGeoAndRegeo().then(function(ok2) {
                        if (ok2) { done(); return; }
                        return tryAmap().then(function(ok3) {
                            if (ok3) { done(); return; }
                            return tryJsonpIpApi().then(function(ok4) {
                                if (ok4) { done(); return; }
                                return tryCorsProxyIpApi().then(function(ok5) {
                                    if (ok5) { done(); return; }
                                    return tryIpapiCo().then(function(ok6) {
                                        if (ok6) { done(); return; }
                                        return tryZhengbingdong().then(function() { done(); });
                                    });
                                });
                            });
                        });
                    });
                });
            });
            return locationPromise;
        }

        function startPrizeScaleAnimation() {
            prizeScaleAnimating = true;
            prizeScaleStartTime = performance.now();
            if (prizeScaleFrameId) {
                cancelAnimationFrame(prizeScaleFrameId);
            }
            const animate = (now) => {
                const elapsed = now - prizeScaleStartTime;
                const t = Math.min(1, elapsed / PRIZE_SCALE_DURATION);
                // 轻微弹跳：1 -> 1.1 -> 1
                prizeScale = 1 + 0.1 * Math.sin(t * Math.PI);
                drawPrizeLayer();
                if (t < 1) {
                    prizeScaleFrameId = requestAnimationFrame(animate);
                } else {
                    prizeScale = 1;
                    prizeScaleAnimating = false;
                }
            };
            prizeScaleFrameId = requestAnimationFrame(animate);
        }

        // 在指定最大宽度内自动按字拆分为多行并居中绘制
        function drawWrappedCenteredText(ctx, text, centerX, centerY, maxWidth, baseFont, lineHeight) {
            ctx.font = baseFont;
            const chars = Array.from(text); // 兼容中英文 / emoji
            const lines = [];
            let currentLine = '';

            for (let i = 0; i < chars.length; i++) {
                const testLine = currentLine + chars[i];
                const metrics = ctx.measureText(testLine);
                const testWidth = metrics.width;
                if (testWidth > maxWidth && currentLine !== '') {
                    lines.push(currentLine);
                    currentLine = chars[i];
                } else {
                    currentLine = testLine;
                }
            }
            if (currentLine) {
                lines.push(currentLine);
            }

            const totalHeight = lines.length * lineHeight;
            let startY = centerY - (totalHeight - lineHeight) / 2;

            for (let i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i], centerX, startY + i * lineHeight);
            }
        }

        // --- 设置画布实际分辨率 (适配高分屏) ---

            if (containerWidth === 0) return;

            // 设置canvas元素尺寸为CSS尺寸的两倍(防止模糊)
            const dpr = window.devicePixelRatio || 1;

            if (scratchCanvas.width !== displayWidth || scratchCanvas.height !== displayHeight) {
                scratchCanvas.width = displayWidth;
                scratchCanvas.height = displayHeight;
                prizeCanvas.width = displayWidth;

        // --- 奖品层绘制 (你定内容！) ---
        function drawPrizeLayer() {
            const w = prizeCanvas.width;

            // 暖色浪漫背景
            ctxPrize.clearRect(0, 0, w, h);

            gradient.addColorStop(0, '#ffd0d0');

            ctxPrize.fillRect(0, 0, w, h);

            // 画一些小心心装饰
            ctxPrize.save();
            ctxPrize.shadowColor = '#ff7b7b';
            ctxPrize.shadowBlur = 12;
            for (let i = 0; i < 7; i++) {
                ctxPrize.fillStyle = `rgba(255, 100, 130, ${0.2 + Math.random()*0.2})`;
                ctxPrize.beginPath();
                ctxPrize.arc(40 + i*70, 50 + (i%3)*20, 18, 0, 2*Math.PI);
                ctxPrize.fill();
            }
            ctxPrize.restore();

            // ----- 主要奖品/情话内容 (由你定!!!) -----
            ctxPrize.save();
            ctxPrize.textAlign = 'center';
            ctxPrize.textBaseline = 'middle';
            ctxPrize.shadowColor = '#ff9bb5';
            ctxPrize.shadowBlur = 12;
            ctxPrize.shadowOffsetX = 2;
            ctxPrize.shadowOffsetY = 2;

            // 当前奖项文本
            const prizeText = getCurrentPrizes()[currentPrizeIndex] || '今日愿望成真';

            // 奖项标题（手机端略小）
            const titleFontSize = baseSize < 420 ? 24 : 32;
            ctxPrize.font = `bold ${titleFontSize}px "KaiTi", "楷体", "Segoe UI", cursive, sans-serif`;
            ctxPrize.fillStyle = '#a02c5a';
            ctxPrize.fillText('今日的小惊喜', w/2, h/3.3);

            // 奖项内容（超出宽度自动多行居中，并带轻微缩放动画）
            ctxPrize.fillStyle = '#d0183f';
            const contentFontSize = baseSize < 420 ? 32 : 40; // 小屏用更小字号
            const contentFont = `bold ${contentFontSize}px "KaiTi", "楷体", "Segoe UI", curs-serif, sans-serif`;
            const maxContentWidth = w * 0.75; // 内容最大宽度占画布 75%
            const lineHeight = Math.round(contentFontSize * 1.25); // 行高跟随字号

            ctxPrize.save();
            ctxPrize.translate(w / 2, h / 2 + 10);
            ctxPrize.scale(prizeScale, prizeScale);
            drawWrappedCenteredText(
                ctxPrize,
                prizeText,
                0,
                0,
                maxContentWidth,
                contentFont,
                lineHeight
            );
            ctxPrize.restore();

            // 底部小字（手机端略小）

            ctxPrize.font = `bold ${footerFontSize}px "Segoe UI", "微软雅黑", cursive`;
            ctxPrize.fillStyle = '#a1355c';
            ctxPrize.fillText('· 刮到就要兑现哦 ·', w/2, h - 70);

            ctxPrize.restore();

            // 糖果装饰：电脑端一圈，手机端改为底部一排，避免挡住文字
            ctxPrize.save();
            ctxPrize.font = 'bold 18px "KaiTi", cursive';
            ctxPrize.fillStyle = '#b33b5c';
            ctxPrize.shadowBlur = 8;
            ctxPrize.shadowColor = '#ffc6d5';
            if (baseSize < 420) {
                // 手机端：底部一排小糖果
                const rowY = h - 40;
                const count = 7;
                const startX = w * 0.18;
                const endX = w * 0.82;
                const step = (endX - startX) / (count - 1);
                for (let i = 0; i < count; i++) {
                    const x = startX + step * i;
                    ctxPrize.fillText('🍬', x, rowY);
                }
            } else {
                // 电脑端：一圈浪漫小字
                const candyRadius = Math.min(w, h) * 0.45;
                for (let ang = 0; ang < 360; ang += 45) {
                    let rad = ang * Math.PI / 180;
                    let x = w/2 + Math.cos(rad) * candyRadius;
                    let y = h/2 + Math.sin(rad) * candyRadius;
                    ctxPrize.fillText('🍬', x, y);
                }

            ctxPrize.restore();

        // --- 初始化刮层 (银色磨砂质感) ---
        function resetScratchLayer() {

        // --- 进度计算 & 显示 ---
        function calculateScratchedPercent() {
            const w = scratchCanvas.width;
            const h = scratchCanvas.height;
            if (w === 0 || h === 0) return 0;

            try {
                const imageData = ctxScratch.getImageData(0, 0, w, h);
                const data = imageData.data;
                let transparentPixels = 0;
                const totalPixels = w * h;
                // 每隔3像素采样一次加快速度 (不影响大概百分比)
                for (let i = 3; i < data.length; i += 12) {  // 每4个值一个像素(rgba), 这里取alpha通道索引i+3, 跳着采样
                    const alpha = data[i];  // 每四个一组： r,g,b,a ; i 从3开始是第一个像素的alpha
                    if (alpha < 10) transparentPixels++;  // 接近透明表示刮开
                }
                let percent = (transparentPixels / (totalPixels/4)) * 100;  // 因为跳着采样除4
                return Math.min(100, Math.round(percent));
            } catch (e) {
                return 0;
            }
        }

        // 检测正中间区域（中奖内容区）是否已刮开；手机端需刮开10%，电脑端6%
        function isCenterScraped() {
            const w = scratchCanvas.width;
            const h = scratchCanvas.height;
            if (w === 0 || h === 0) return false;
            const isMobile = (window.innerWidth || document.documentElement.clientWidth || 0) <= 720;
            const threshold = isMobile ? 0.10 : 0.06;
            const x0 = Math.floor(w * 0.3);
            const y0 = Math.floor(h * 0.38);
            const rw = Math.floor(w * 0.4);
            const rh = Math.floor(h * 0.24);
            if (rw <= 0 || rh <= 0) return false;
            try {
                const imageData = ctxScratch.getImageData(x0, y0, rw, rh);
                const data = imageData.data;
                let transparent = 0;
                const total = rw * rh;
                for (let i = 3; i < data.length; i += 4) {
                    if (data[i] < 10) transparent++;
                }
                return total > 0 && (transparent / total) >= threshold;
            } catch (e) {
                return false;
            }
        }

        // --- 刮擦交互 ---
        let isDrawing = false;
        let lastX = 0, lastY = 0;

        function getCanvasCoords(e) {
            const rect = scratchCanvas.getBoundingClientRect();
            const scaleX = scratchCanvas.width / rect.width;
            const scaleY = scratchCanvas.height / rect.height;

            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;

            // 边界限制
            return {
                x: Math.min(scratchCanvas.width-1, Math.max(0, canvasX)),
                y: Math.min(scratchCanvas.height-1, Math.max(0, canvasY))
            };
        }

        function startDraw(e) {
            e.preventDefault();
            if (!cachedLocation) fetchLocation();
            isDrawing = true;
            const coord = getCanvasCoords(e);
            lastX = coord.x;
            lastY = coord.y;
            ctxScratch.beginPath();
            ctxScratch.moveTo(lastX, lastY);
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();

            const coord = getCanvasCoords(e);
            const currentX = coord.x;
            const currentY = coord.y;

            // 刮擦效果 —— 将线条区域变成完全透明 (destination-out: 保留背景，擦除前景)
            ctxScratch.globalCompositeOperation = 'destination-out';
            ctxScratch.lineWidth = 42;  // 笔触大小（甜蜜刮刮）
            ctxScratch.lineCap = 'round';
            ctxScratch.lineJoin = 'round';
            ctxScratch.strokeStyle = 'rgba(0,0,0,1)'; // 在destination-out下颜色无所谓，透明度影响擦除强度
            ctxScratch.beginPath();
            ctxScratch.moveTo(lastX, lastY);
            ctxScratch.lineTo(currentX, currentY);
            ctxScratch.stroke();

            // 添加随机散点，增加刮开范围
            ctxScratch.beginPath();
            ctxScratch.arc(currentX, currentY, 18, 0, Math.PI*2);
            ctxScratch.fill();

            // 恢复合成模式 以免影响后续
            ctxScratch.globalCompositeOperation = 'source-over';

            lastX = currentX;
            lastY = currentY;

            // 节流更新进度(每帧只计算一次)
            if (!window._throttleTimer) {
                window._throttleTimer = setTimeout(() => {
                    const percent = calculateScratchedPercent();
                    handleScratchedPercent(percent);
                    window._throttleTimer = null;
                }, 40);
            }
        }

        function stopDraw(e) {
            if (isDrawing) {
                isDrawing = false;
                ctxScratch.closePath();
                // 最后计算一次精确进度
                const percent = calculateScratchedPercent();
                handleScratchedPercent(percent);
            }
            e.preventDefault();
        }

        // --- 绑定事件 ---
        function bindEvents() {
            scratchCanvas.addEventListener('mousedown', startDraw);
            scratchCanvas.addEventListener('mousemove', draw);
            scratchCanvas.addEventListener('mouseup', stopDraw);
            scratchCanvas.addEventListener('mouseleave', stopDraw);

            // 触摸事件
            scratchCanvas.addEventListener('touchstart', startDraw, { passive: false });
            scratchCanvas.addEventListener('touchmove', draw, { passive: false });
            scratchCanvas.addEventListener('touchend', stopDraw, { passive: false });
            scratchCanvas.addEventListener('touchcancel', stopDraw, { passive: false });
        }

        // --- 重置 ---（依据下方刮开进度条：手机端需≥10%，电脑端需≥6%）
        document.getElementById('resetBtn').addEventListener('click', async function(e){
            e.preventDefault();

            const percent = calculateScratchedPercent();
            const isMobile = (window.innerWidth || document.documentElement.clientWidth || 0) <= 720;
            const needPercent = isMobile ? 10 : 6;
            if (percent < needPercent) {
                showToast('目前未刮奖或未刮全中奖内容');
                return;
            }

            // 先等定位（最多 0.6 秒），再写入历史，保证记录带位置
            const lastPrize = getCurrentPrizes()[currentPrizeIndex];
            if (lastPrize) {
                await waitForLocation(600);
                addRecordItem(lastPrize);
            }

            // 每次重置前先随机一个新奖项，并触发文字缩放动画
            pickNewPrize();
            startPrizeScaleAnimation();
            // 重新盖上刮层
            resetScratchLayer();
            updateProgress(0);
        });

        // --- 版本切换：奖励版 / 惩罚版 ---
        const versionRewardBtn = document.getElementById('versionReward');
        const versionPunishmentBtn = document.getElementById('versionPunishment');
        function setVersion(version) {
            currentVersion = version;
            if (versionRewardBtn) versionRewardBtn.classList.toggle('active', version === 'reward');
            if (versionPunishmentBtn) versionPunishmentBtn.classList.toggle('active', version === 'punishment');
            pickNewPrize();
            drawPrizeLayer();   // 立即重绘底层奖品，刮开即显示当前版本内容
            resetScratchLayer();
            updateProgress(0);
        }
        if (versionRewardBtn) versionRewardBtn.addEventListener('click', function() { setVersion('reward'); });
        if (versionPunishmentBtn) versionPunishmentBtn.addEventListener('click', function() { setVersion('punishment'); });

        // --- 历史记录展开/收起（超过 10 条时）---
        const recordToggle = document.getElementById('recordToggle');
        if (recordToggle && recordList) {
            recordToggle.addEventListener('click', function() {
                recordList.classList.toggle('collapsed');
                recordToggle.textContent = recordList.classList.contains('collapsed') ? '展开' : '收起';
            });
        }

        // --- 清空记录 ---（只清空列表内容，保留历史记录框显示）
        document.getElementById('clearRecordBtn').addEventListener('click', function(e){
            e.preventDefault();
            if (!recordList || !recordPanel) return;
            recordList.innerHTML = '';
            recordCount = 0;
            recordPanel.classList.remove('has-many');
            recordList.classList.remove('collapsed');
            if (recordToggle) recordToggle.textContent = '展开';
        });

        // 历史记录框高度与刮奖区域一致（手机端同高）
        function syncRecordPanelHeight() {
            const scratchContainer = document.getElementById('scratchContainer');
            if (!recordPanel || !scratchContainer) return;
            const isMobile = (window.innerWidth || 0) <= 720;
            if (isMobile) {
                recordPanel.style.height = scratchContainer.offsetHeight + 'px';
            } else {
                recordPanel.style.height = '';
            }
        }

        // 初始化 & 窗口大小自适应
        window.addEventListener('resize', () => {
            resizeCanvases();
            syncRecordPanelHeight();
        });

        // 启动
        resizeCanvases();
        bindEvents();
        syncRecordPanelHeight();

        // 确保首次绘制完成
        setTimeout(() => {
            resizeCanvases();
            syncRecordPanelHeight();
        }, 30);

        // --- 四位数字密码门：输入满4位自动校验，正确直接进入，错误弹提示 ---
        var GATE_PASSWORD = '0719';
        var passwordGateOverlay = document.getElementById('passwordGateOverlay');
        var passwordGateInput = document.getElementById('passwordGateInput');

        function unlockScratch() {
            if (passwordGateOverlay) passwordGateOverlay.style.display = 'none';
            if (cardEl) cardEl.style.display = '';
            // 卡片从隐藏变为显示后，容器才有宽高，需重新计算 canvas 尺寸并重绘
            requestAnimationFrame(function() {
                resizeCanvases();
                syncRecordPanelHeight();
            });
        }

        if (passwordGateInput) {
            passwordGateInput.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '').slice(0, 4);
                if (this.value.length === 4) {
                    if (this.value === GATE_PASSWORD) {
                        unlockScratch();
                    } else {
                        showToast('密码错误，请重新输入');
                        this.value = '';
                    }
                }
            });
        }
    })();
</script>
</body>
</html>
